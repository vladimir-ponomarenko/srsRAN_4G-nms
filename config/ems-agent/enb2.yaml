element:
  # Network element type managed by this EMS instance.
  type: enb
  # UDS path for JSON metrics emitted by the element.
  socket_path: /var/run/enb-metrics/enb2_metrics.uds

bus:
  # Internal bus buffer size.
  buffer: 200

metrics:
  # Path where the latest raw JSON metrics snapshot is stored.
  snapshot_path: /var/run/enb-metrics/enb2_metrics.json
  # Log raw UDS metrics as received.
  log_uds_metrics: false

log:
  # Default log level for all components.
  level: info
  # Output format: json or console.
  format: console
  # Colorize levels in console format.
  color: true
  # RFC3339 timestamps.
  timestamp: true
  # Optional per-component overrides.
  components:
    metrics: debug
    adapter: debug
    netconf: debug

netconf:
  enabled: true
  addr: 0.0.0.0:8302
  transport: ssh
  snapshot_path: /var/run/enb-metrics/enb2_metrics.json
  yang_dir: /app/yang
  ssh:
    hostkey: /app/netconf/hostkey
    authorized_key: /app/netconf/authorized_keys
    username: admin

nrm:
  subnetwork: srsRAN
  managed_element: enb2
  enb_function_id: "1"

pm:
  enabled: false
  granularity_period: 10s
  report_period: 10s
