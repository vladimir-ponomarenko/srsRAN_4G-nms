element:
  # Network element type managed by this EMS instance.
  type: enb
  # UDS path for JSON metrics emitted by the element.
  socket_path: /var/run/enb-metrics/enb1_metrics.uds

bus:
  # Internal bus buffer size.
  buffer: 200

metrics:
  # Path where the latest raw JSON metrics snapshot is stored.
  snapshot_path: /var/run/enb-metrics/enb1_metrics.json
  # Log raw UDS metrics as received.
  log_uds_metrics: false

log:
  # Default log level for all components.
  level: info
  # Output format: json or console.
  format: console
  # Colorize levels in console format.
  color: true
  # RFC3339 timestamps.
  timestamp: true
  # Optional per-component overrides.
  components:
    metrics: debug
    adapter: debug
    netconf: debug

netconf:
  enabled: true
  addr: 0.0.0.0:8301
  transport: ssh
  snapshot_path: /var/run/enb-metrics/enb1_metrics.json
  yang_dir: /app/yang
  ssh:
    hostkey: /app/netconf/hostkey
    authorized_key: /app/netconf/authorized_keys
    username: admin

nrm:
  subnetwork: srsRAN
  managed_element: enb1
  enb_function_id: "1"

pm:
  enabled: true
  granularity_period: 10s
  report_period: 10s

fm:
  tca:
    enabled: true
    test_injection_enabled: false
    rules:
      s1_interface_down:
        enabled: true
        raise_threshold: 1
        clear_threshold: 1
        raise_duration: 0s
        clear_duration: 10s
      nas_signaling_loss:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      nas_security_mismatch:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      nas_parsing_failure:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      rrc_protocol_error:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      rrc_connection_rejection:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      core_service_reject:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      paging_capacity_exceeded:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      rlc_max_retransmissions:
        enabled: true
        raise_threshold: 0
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      low_throughput:
        enabled: true
        raise_threshold: 1000000
        clear_threshold: 1000001
        raise_duration: 30s
        clear_duration: 10s
      bad_signal_condition:
        enabled: true
        raise_threshold: 0
        clear_threshold: 5
        raise_duration: 10s
        clear_duration: 10s
      high_bler:
        enabled: true
        raise_threshold: 0.10
        clear_threshold: 0.05
        raise_duration: 10s
        clear_duration: 10s
      radio_link_failure_storm:
        enabled: true
        raise_threshold: 5
        clear_threshold: 0
        raise_duration: 0s
        clear_duration: 30s
      rf_interference_detected:
        enabled: true
        raise_threshold: -90
        clear_threshold: -95
        raise_duration: 10s
        clear_duration: 10s
      ue_inactivity_cleanup:
        enabled: true
        raise_threshold: 0.8
        clear_threshold: 0.1
        raise_duration: 30s
        clear_duration: 30s
      bearer_congestion:
        enabled: true
        raise_threshold: 500000
        clear_threshold: 100000
        raise_duration: 10s
        clear_duration: 10s
      power_headroom_critical:
        enabled: true
        raise_threshold: 0
        clear_threshold: 3
        raise_duration: 10s
        clear_duration: 10s

control:
  enabled: true
  addr: 0.0.0.0:18081
  restart:
    docker_socket: /var/run/docker.sock
    timeout: 20s
    targets:
      - container: ENB-1
        enb_config_path: /app/element-config/enb1.conf
        rr_config_path: /app/element-config/enb1_rr.conf
        sib_config_path: /app/element-config/enb1_sib.conf
        rb_config_path: /app/element-config/enb1_rb.conf
